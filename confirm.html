<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed - SquadUp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0E17; color: #F4F2FF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #161B29; border: 1px solid #232a3d; border-radius: 20px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; }
    .logo { width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 20px; display: block; }
    .checkmark { width: 56px; height: 56px; background: rgba(6,214,160,0.15); border: 2px solid #06D6A0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #F4F2FF; }
    p { color: #9AA3B5; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .btn { display: inline-block; background: linear-gradient(135deg, #8338EC, #3A7BFF); color: #fff; font-weight: 700; font-size: 15px; padding: 14px 32px; border-radius: 12px; text-decoration: none; }
    .store-link { margin-top: 16px; display: block; color: #5C6480; font-size: 13px; }
    .store-link a { color: #8338EC; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/playstore-icon.png" alt="SquadUp" class="logo" onerror="this.style.display='none'">
    <div class="checkmark">✓</div>
    <h1>Email confirmed!</h1>
    <p>Your SquadUp account is ready. Open the app on your phone to sign in and start finding your squad.</p>
    <a href="https://play.google.com/store/apps/details?id=com.ggworks.squadup" class="btn">Open SquadUp</a>
    <span class="store-link">Don't have the app? <a href="https://play.google.com/store/apps/details?id=com.ggworks.squadup">Download on Google Play</a></span>
  </div>
</body>
</html>
