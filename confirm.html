<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SquadUp - Confirming...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; background: #0B0E17; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #F4F2FF; flex-direction: column; gap: 16px; }
    img { width: 64px; height: 64px; border-radius: 16px; }
    p { color: #7A8299; font-size: 14px; margin: 0; text-align: center; }
    h2 { margin: 0; font-size: 20px; }
  </style>
</head>
<body>
  <img src="playstore-icon.png" alt="SquadUp" onerror="this.style.display='none'"/>
  <h2>Opening SquadUp...</h2>
  <p>If the app doesn't open automatically,<br>make sure SquadUp is installed.</p>
  <script>
    var params = window.location.search;
    var hash = window.location.hash;
    var deepLink = "com.ggworks.squadup://auth/callback" + params + hash;
    window.location.href = deepLink;
    setTimeout(function() {
      window.location.href = "https://play.google.com/store/apps/details?id=com.ggworks.squadup";
    }, 2500);
  </script>
</body>
</html>
